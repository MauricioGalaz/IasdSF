<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTeen: Hands Up Challenge - Edición 20 Cartas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@800;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .font-urbanist { font-family: 'Urbanist', sans-serif; }
        .perspective { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-between p-4 selection:bg-red-500/30">

    <header class="w-full max-w-5xl flex items-center justify-between border-b border-slate-800 pb-4 mb-2">
        <div class="flex items-center gap-3">
            <div class="bg-white text-slate-950 px-3 py-1 rounded-lg font-urbanist font-black text-xl tracking-tighter shadow-md shadow-red-500/10">
                G<span class="text-red-600">TEEN</span>
            </div>
            <div class="h-6 w-[1px] bg-slate-800"></div>
            <p class="text-xs font-semibold tracking-wider text-slate-400 uppercase hidden sm:block">Hands Up Challenge • Edición Expandida</p>
        </div>
        <div class="bg-red-600/10 border border-red-500/20 px-3 py-1 rounded-full">
            <span class="text-xs font-black text-red-500 uppercase tracking-widest" id="level-indicator">Nivel 1: El Ascenso</span>
        </div>
    </header>

    <section class="w-full max-w-2xl bg-slate-900/60 rounded-2xl p-4 border border-slate-800/80 flex justify-around items-center text-center shadow-xl mb-4">
        <div>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Puntos GTeen</p>
            <p id="score-display" class="text-2xl font-urbanist font-black text-white">000</p>
        </div>
        <div class="h-8 w-[1px] bg-slate-800"></div>
        <div>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Movimientos</p>
            <p id="moves-display" class="text-2xl font-urbanist font-black text-red-500">0</p>
        </div>
        <div class="h-8 w-[1px] bg-slate-800"></div>
        <div>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Cartas en Tablero</p>
            <p class="text-xl font-urbanist font-black text-amber-400">20 <span class="text-xs text-slate-400">Pcs</span></p>
        </div>
        <div class="h-8 w-[1px] bg-slate-800"></div>
        <div>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Progreso</p>
            <p id="stage-display" class="text-xs font-black text-emerald-400 mt-1 uppercase">Fase 1/3</p>
        </div>
    </section>

    <main class="w-full max-w-5xl flex-grow flex items-center justify-center p-1">
        <div id="grid-container" class="grid grid-cols-4 sm:grid-cols-5 gap-3 w-full perspective">
            </div>
    </main>

    <div id="status-modal" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 rounded-3xl p-8 max-w-md w-full text-center border border-slate-800 shadow-2xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-red-600/10 rounded-full blur-2xl"></div>
            
            <div id="modal-icon" class="text-6xl mb-4 animate-bounce">⚡</div>
            <h2 id="modal-title" class="text-2xl font-urbanist font-black text-white uppercase tracking-tight">¡Nivel Completado!</h2>
            <p id="modal-desc" class="text-slate-400 text-xs sm:text-sm my-4 font-medium px-2 leading-relaxed"></p>
            
            <button id="modal-action-btn" class="w-full bg-red-600 hover:bg-red-700 active:scale-95 text-white font-urbanist font-black py-4 rounded-xl shadow-lg shadow-red-600/20 transition-all tracking-wider uppercase cursor-pointer text-sm">
                Siguiente Desafío
            </button>
        </div>
    </div>

    <footer class="w-full text-center text-[9px] text-slate-600 font-bold tracking-widest uppercase mt-4">
        GTeen Media System © 2026 • Éxodo 17 Extended Visual Experience
    </footer>

    <script>
        // REPOSITORIO DE ELEMENTOS GRÁFICOS (10 Parejas = 20 Cartas simultáneas por nivel)
        const masterVisualAssets = {
            1: { bg: 'from-amber-500 to-orange-600', icon: '👴✨', name: 'Moisés el Intercesor' },
            2: { bg: 'from-blue-600 to-cyan-500', icon: '🙌⛰️', name: 'Manos en Alto en la Cumbre' },
            3: { bg: 'from-indigo-600 to-purple-600', icon: '🧑‍🤝‍🧑🛡️', name: 'Aarón y Hur al Rescate' },
            4: { bg: 'from-emerald-600 to-teal-500', icon: '⚔️🏃‍♂️', name: 'Josué Contrataca' },
            5: { bg: 'from-rose-600 to-red-700', icon: '🥷🔥', name: 'Invasión de Amalec' },
            6: { bg: 'from-sky-500 to-indigo-500', icon: '🪵👑', name: 'La Vara de Dios levantada' },
            7: { bg: 'from-violet-600 to-fuchsia-600', icon: '🪨💧', name: 'La Roca de Horeb' },
            8: { bg: 'from-orange-500 to-red-500', icon: '🥱📉', name: 'Cansancio Físico Extremo' },
            9: { bg: 'from-emerald-500 to-green-600', icon: '🪑⛰️', name: 'La Piedra de Apoyo' },
            10: { bg: 'from-yellow-400 to-amber-500', icon: '🚩🏆', name: 'Jehová Nissi (Nuestro Estandarte)' }
        };

        // 3 CONFIGURACIONES CON VARIACIONES DE HISTORIA (Manteniendo siempre las 20 cartas)
        const levelsConfiguration = {
            1: { name: 'Nivel 1: El Ascenso del Líder', desc: 'Fuerza Inicial. Logra emparejar los 10 conceptos visuales del frente montañoso de Refidim antes de que decaigan los brazos de Moisés.' },
            2: { name: 'Nivel 2: La Densidad del Valle', desc: 'Presión en el Desierto. Las cartas han cambiado de orden y distribución. Encuentra las 10 claves tácticas de la batalla de Josué.' },
            3: { name: 'Nivel 3: El Altar del Estandarte', desc: 'Desafío GTeen de Élite. Consigue la victoria definitiva descubriendo las 20 cartas con el menor número de movimientos posibles. ¡Demuestra tu memoria!' }
        };

        let currentLevel = 1;
        let activeCards = [];
        let totalMoves = 0;
        let totalScore = 0;
        let lockGrid = false;

        const gridContainer = document.getElementById('grid-container');
        const scoreDisplay = document.getElementById('score-display');
        const movesDisplay = document.getElementById('moves-display');
        const levelIndicator = document.getElementById('level-indicator');
        const stageDisplay = document.getElementById('stage-display');
        
        const statusModal = document.getElementById('status-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalIcon = document.getElementById('modal-icon');
        const modalBtn = document.getElementById('modal-action-btn');

        // AUDIO ENGINE NATIVO (Osciladores de Audio WEB)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function triggerSfx(preset) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (preset === 'flip') {
                osc.frequency.setValueAtTime(320, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(650, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (preset === 'match') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.07); // G5
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.14); // C6
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else if (preset === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 0.18);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.18);
            }
        }

        // CONSTRUCTOR DE MAZO DE 20 CARTAS
        function buildLevel(level) {
            gridContainer.innerHTML = '';
            activeCards = [];
            lockGrid = false;
            
            const config = levelsConfiguration[level];
            levelIndicator.textContent = config.name;
            stageDisplay.textContent = `Fase ${level}/3`;

            // Construir mazo completo con las 10 parejas (20 elementos)
            let megaDeck = [];
            for (let i = 1; i <= 10; i++) {
                megaDeck.push({ pairId: i, meta: masterVisualAssets[i] });
                megaDeck.push({ pairId: i, meta: masterVisualAssets[i] });
            }

            // Algoritmo de mezclado Fisher-Yates
            for (let i = megaDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [megaDeck[i], megaDeck[j]] = [megaDeck[j], megaDeck[i]];
            }

            // Renderizado estructural en el DOM
            megaDeck.forEach(cardData => {
                const cardNode = document.createElement('div');
                cardNode.className = 'w-full h-24 sm:h-32 relative cursor-pointer select-none transition-transform duration-500 transform-style-3d';
                cardNode.dataset.pairId = cardData.pairId;

                cardNode.innerHTML = `
                    <div class="absolute inset-0 bg-gradient-to-br from-slate-900 to-slate-950 rounded-xl flex flex-col items-center justify-center border border-slate-800 shadow-lg backface-hidden z-20 hover:border-red-500/60 transition-colors">
                        <div class="text-red-500 font-urbanist font-black text-xl tracking-tighter opacity-80 select-none">GT</div>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-br ${cardData.meta.bg} rounded-xl flex flex-col items-center justify-center rotate-y-180 backface-hidden z-10 shadow-inner p-1 border border-white/10">
                        <span class="text-3xl sm:text-4xl drop-shadow-md">${cardData.meta.icon}</span>
                        <span class="text-[7px] font-bold text-white/70 uppercase tracking-tighter mt-1 text-center hidden sm:block px-1 line-clamp-1">${cardData.meta.name}</span>
                    </div>
                `;

                cardNode.addEventListener('click', () => handleCardFlip(cardNode));
                gridContainer.appendChild(cardNode);
            });
        }

        // LÓGICA DE VOLTEO
        function handleCardFlip(card) {
            if (lockGrid || card.classList.contains('rotate-y-180') || activeCards.includes(card)) return;

            triggerSfx('flip');
            card.classList.add('rotate-y-180');
            activeCards.push(card);

            if (activeCards.length === 2) {
                totalMoves++;
                movesDisplay.textContent = totalMoves;
                evaluateMatch();
            }
        }

        // COMPROBACIÓN DE COINCIDENCIAS
        function evaluateMatch() {
            lockGrid = true;
            const [first, second] = activeCards;
            const isMatch = first.dataset.pairId === second.dataset.pairId;

            if (isMatch) {
                totalScore += 25;
                scoreDisplay.textContent = String(totalScore).padStart(3, '0');
                triggerSfx('match');

                activeCards.forEach(c => {
                    c.children[1].classList.add('border-emerald-400', 'scale-95');
                });

                activeCards = [];
                lockGrid = false;

                // Comprobar victoria del mazo de 20 cartas
                const flippedCount = document.querySelectorAll('.rotate-y-180').length;
                if (flippedCount === 20) {
                    handleLevelCompletion();
                }
            } else {
                triggerSfx('error');
                setTimeout(() => {
                    first.classList.remove('rotate-y-180');
                    second.classList.remove('rotate-y-180');
                    activeCards = [];
                    lockGrid = false;
                }, 900);
            }
        }

        // MANEJO DE FIN DE FASE
        function handleLevelCompletion() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.65 } });

            setTimeout(() => {
                if (currentLevel < 3) {
                    modalIcon.textContent = '🚀';
                    modalTitle.textContent = '¡Fase Superada!';
                    modalDesc.textContent = levelsConfiguration[currentLevel].desc;
                    modalBtn.textContent = 'Siguiente Desafío (20 Cartas)';
                    
                    modalBtn.onclick = () => {
                        currentLevel++;
                        statusModal.classList.add('hidden');
                        buildLevel(currentLevel);
                    };
                } else {
                    modalIcon.textContent = '🏆';
                    modalTitle.textContent = '¡Victoria Completa GTeen!';
                    modalDesc.textContent = `Has dominado el desafío de 20 cartas consecutivas en los 3 niveles de la historia con un total de ${totalMoves} movimientos. ¡La unidad y la oración constante nos otorgan el estandarte de Jehová Nissi!`;
                    modalBtn.textContent = 'Reiniciar Modo Hardcore';
                    
                    modalBtn.onclick = () => {
                        currentLevel = 1;
                        totalMoves = 0;
                        totalScore = 0;
                        scoreDisplay.textContent = '000';
                        movesDisplay.textContent = '0';
                        statusModal.classList.add('hidden');
                        buildLevel(currentLevel);
                    };

                    let end = Date.now() + (3.5 * 1000);
                    (function frame() {
                        confetti({ particleCount: 6, angle: 60, spread: 60, origin: { x: 0 } });
                        confetti({ particleCount: 6, angle: 120, spread: 60, origin: { x: 1 } });
                        if (Date.now() < end) requestAnimationFrame(frame);
                    }());
                }
                statusModal.classList.remove('hidden');
            }, 600);
        }

        // Lanzamiento Inicial
        buildLevel(currentLevel);
    </script>
</body>
</html>
